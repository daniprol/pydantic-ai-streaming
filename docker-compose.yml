services:
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    env_file:
      - apps/web/.env.example
    ports:
      - '5173:5173'
    volumes:
      - ./apps/web:/workspace/apps/web
      - web-node-modules:/workspace/apps/web/node_modules
    depends_on:
      - api

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    env_file:
      - apps/api/.env.example
    ports:
      - '8000:8000'
    volumes:
      - ./apps/api:/workspace/apps/api
      - ./packages/pydantic-ai-absurd:/workspace/packages/pydantic-ai-absurd
      - ./pyproject.toml:/workspace/pyproject.toml:ro
      - ./uv.lock:/workspace/uv.lock:ro
      - api-venv:/workspace/.venv
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      temporal:
        condition: service_started
      absurd-bootstrap:
        condition: service_completed_successfully

  temporal-worker:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    command: ['uv', 'run', '--package', 'streaming-chat-api', 'python', '-m', 'streaming_chat_api.temporal_worker']
    env_file:
      - apps/api/.env.example
    volumes:
      - ./apps/api:/workspace/apps/api
      - ./packages/pydantic-ai-absurd:/workspace/packages/pydantic-ai-absurd
      - ./pyproject.toml:/workspace/pyproject.toml:ro
      - ./uv.lock:/workspace/uv.lock:ro
      - temporal-worker-venv:/workspace/.venv
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      temporal:
        condition: service_started

  absurd-bootstrap:
    build:
      context: .
      dockerfile: docker/Dockerfile-absurd-tools
    env_file:
      - apps/api/.env.example
    command:
      [
        'sh',
        '-lc',
        'export PGDATABASE="$$DBOS_SYSTEM_DATABASE_URL" && (absurdctl schema-version >/dev/null 2>&1 && absurdctl migrate || absurdctl init) && (absurdctl create-queue "$$ABSURD_QUEUE_NAME" >/dev/null 2>&1 || true)',
      ]
    depends_on:
      postgres:
        condition: service_healthy

  absurd-worker:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    command: ['uv', 'run', '--package', 'streaming-chat-api', 'python', '-m', 'streaming_chat_api.absurd_worker']
    env_file:
      - apps/api/.env.example
    volumes:
      - ./apps/api:/workspace/apps/api
      - ./packages/pydantic-ai-absurd:/workspace/packages/pydantic-ai-absurd
      - ./pyproject.toml:/workspace/pyproject.toml:ro
      - ./uv.lock:/workspace/uv.lock:ro
      - absurd-worker-venv:/workspace/.venv
    depends_on:
      postgres:
        condition: service_healthy
      absurd-bootstrap:
        condition: service_completed_successfully

  habitat:
    build:
      context: .
      dockerfile: docker/Dockerfile-habitat
    env_file:
      - apps/api/.env.example
    command: ['sh', '-lc', 'exec habitat run -db-url "$$DBOS_SYSTEM_DATABASE_URL" -listen ":7890"']
    ports:
      - '7890:7890'
    depends_on:
      postgres:
        condition: service_healthy
      absurd-bootstrap:
        condition: service_completed_successfully

  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: streaming_chat
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d streaming_chat']
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - '6379:6379'

  temporal:
    image: temporalio/auto-setup:1.25.2
    environment:
      DB: postgres12
      DB_PORT: 5432
      POSTGRES_USER: postgres
      POSTGRES_PWD: postgres
      POSTGRES_SEEDS: postgres
    ports:
      - '7233:7233'
    depends_on:
      postgres:
        condition: service_healthy

  temporal-ui:
    image: temporalio/ui:2.34.0
    environment:
      TEMPORAL_ADDRESS: temporal:7233
    ports:
      - '8233:8080'
    depends_on:
      - temporal

volumes:
  postgres-data:
  api-venv:
  temporal-worker-venv:
  absurd-worker-venv:
  web-node-modules:
