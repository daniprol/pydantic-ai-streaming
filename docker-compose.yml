services:
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    env_file:
      - apps/web/.env.example
    ports:
      - "5173:5173"
    volumes:
      - ./apps/web:/workspace/apps/web
    depends_on:
      - api

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    env_file:
      - apps/api/.env
    ports:
      - "8000:8000"
    volumes:
      - ./apps/api:/workspace/apps/api
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      temporal:
        condition: service_started

  temporal-worker:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    command: ["uv", "run", "python", "-m", "streaming_chat_api.temporal.worker"]
    env_file:
      - apps/api/.env
    volumes:
      - ./apps/api:/workspace/apps/api
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      temporal:
        condition: service_started

  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: streaming_chat
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d streaming_chat"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  temporal:
    image: temporalio/auto-setup:1.25.2
    environment:
      DB: postgres12
      DB_PORT: 5432
      POSTGRES_USER: postgres
      POSTGRES_PWD: postgres
      POSTGRES_SEEDS: postgres
    ports:
      - "7233:7233"
    depends_on:
      postgres:
        condition: service_healthy

  temporal-ui:
    image: temporalio/ui:2.34.0
    environment:
      TEMPORAL_ADDRESS: temporal:7233
    ports:
      - "8233:8080"
    depends_on:
      - temporal

volumes:
  postgres-data:
