[alembic]
script_location = alembic
prepend_sys_path = .
file_template = %%(year)d-%%(month).2d-%%(day).2d_%%(slug)s

sqlalchemy.url = postgresql+asyncpg://postgres:postgres@localhost:5432/streaming_chat

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers = console
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
